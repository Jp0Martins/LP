<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links Página 1</title>
</head>
<style>
    body{
        display: flex;
        flex-direction: column;
        background-color: grey;
        align-items: center;
    }
    a{
        text-decoration: none;
        color: olive;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 20px;
        color: white;
        border-radius: 10px;
    }

    a:hover{
        color: rgb(153, 240, 153);
        box-shadow: rgb(0, 0, 0);
        font-size: 25px;
        transition: 0.3s;
    }


    ul{
        display: flex;
        justify-content: center;
        align-items: center;
        max-width: 50%;
        border: 1px solid black;
        flex-direction: column;
        border-radius: 15px;
    }

    li{
        padding: 10px;
        list-style: none;
    }
    
</style>
<body>
  
    <ul>
        <li><a href="https://www.instagram.com/" target="_blank">Insta</a></li>

        <li><a href="https://www.youtube.com/watch?v=c71wYk3GuQo" target="_top">Queques fofinhos de laranja e chocolate</a></li>

        <li><a href="pagina2.html" target="_self">Página 2</a></li>
    </ul>

</body>
</html>
